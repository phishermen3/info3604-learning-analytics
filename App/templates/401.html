<!doctype html>
<html>
    <head>
        <!--Import Google Icon Font-->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <!-- Compiled and minified CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
        <!--Let browser know website is optimized for mobile-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta charset="UTF-8">

        <title>Not Authorized</title>
    </head>

    <body>
        <div class="container">
            <div class="row" style="margin-top: 10%;">
                <div class="col s12 m10 offset-m1">
                    <div class="card-content">
                        <h1>401 - Not Authorized</h1>
                        <p>You do not have permission to access this resource. Please check your credentials and try again.</p>
                        <p>{{error}}</p>
                    </div>
                    <div class="card-action">
                        <a href="/" class="waves-effect waves-light btn">Go Home</a>
                        <a href="javascript:history.back()" class="waves-effect waves-light btn">Go Back</a>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    </body>
</html>
