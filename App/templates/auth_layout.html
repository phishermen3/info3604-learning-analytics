<!doctype html>
<html>
    <head>
        <!--Import Google Icon Font-->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <!-- Compiled and minified CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="icon" href="/static/log-stack-logo.png" type="image/png">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
        <!--Let browser know website is optimized for mobile-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta charset="UTF-8">

        <title>{% block title %}{% endblock %}</title>

        <style>
            *{
                padding: 0;
                margin: 0;
                box-sizing: border-box;
            }

            body{
                background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), #27293d, #1e1e2f);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                transition: background 0.1s ease;
            }

            .login-form{
                min-height: 100vh;
                width: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .login-form h1{
                text-align: center;
                font-size: 2.5rem;
                font-weight: 400;
                margin-bottom: 30px;
                width: 100%;
                font-family: 'Poppins', sans-serif;
                font-weight: 800;
                color: white;
            }

            .logo-accent {
                color: #9e8ff3;
            }

            .login-form h2{
                margin: 0 0 25px 0;
                font-size: 22px;
                font-weight: 600;
                text-align: left;
            }

            .content{
                width: 500px;
                max-width: 100%;
                padding: 2.5em;
                background-color: #27293d;
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
                border-radius: 15px;
                font-family: 'Noto Sans', sans-serif;
                color: #b8b9c3;
                margin: 0 auto;
                box-sizing: border-box;
            }

            .input-group{
                margin-bottom: 20px;
            }

            .input-group label{
                display: block;
                color: #b8b9c3;
                font-size: 13px;
                margin-bottom: 8px;
                margin-left: 5px;
                position: static;
                pointer-events: all;
            }

            .login-form input[type="text"],
            .login-form input[type="password"]{
                color: #b8b9c3;
                background: #1e1e2f !important;
                border: 1px solid #1e1e2f !important;
                border-radius: 30px !important;
                padding: 0 20px !important;
                height: 48px !important;
                width: 100% !important;
                box-sizing: border-box !important;
                margin-bottom: 0 !important;
                box-shadow: none !important;
                transition: 0.3s ease;
            }

            .login-form input:focus {
                color: #1e1e2f !important;
            }

            .login-form input::placeholder {
                color: #6f6f7e;
                opacity: 1;    
            }

            .login-form input:focus{
                border: 1px solid #6f6f7e !important;
                background: #fff !important;
            }

            .checkbox-container{
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 15px 0 25px 5px;
            }
            
            [type="checkbox"]+span:not(.lever){
                font-size: 14px;
                color: #b8b9c3;
            }

            [type="checkbox"].filled-in:not(:checked) + span:before {
                border: 2px solid #27293d !important;
            }

            [type="checkbox"].filled-in:checked+span:not(.lever):after{
                border: 1px solid #9e8ff3 !important;
                background-color: #9e8ff3 !important;
            }

            .login-form button{
                font-size: 16px;
                color: #fff;
                width: 100%;
                background: #9e8ff3;
                border: none;
                padding: 12px;
                font-weight: 600;
                border-radius: 30px;
                cursor: pointer;
                transition: 0.3s ease;
                text-transform: none;
            }

            .login-form button:hover{
                background: #7467c0;
            }

            p.account{
                margin-top: 25px;
                font-size: 14px;
                text-align: center;
                opacity: 0.8;
            }

            p.account a{
                color: #9e8ff3;
                font-weight: 600;
            }

            p.account a:hover{
                text-decoration: underline;
            }

            @media(max-width: 480px){
                .login-form h1{
                    font-size: 1.8rem;
                    margin-bottom: 20px;
                }
                
                .content{
                    padding: 1.5em;
                }

                .login-form h2{
                    font-size: 18px;
                }
            }
        </style>

        {% block styles %}{% endblock %}
    </head>

    <body>
        <div class="login-form">
            <h1>Log <span class="logo-accent">Stack</span></h1>  
            <div class="content">
                {% block form_content %}{% endblock %}
            </div>
        </div>

        {% block modal_content %}{% endblock %}

        <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
        
        <script>
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                document.body.style.setProperty('--mouse-x', x + '%');
                document.body.style.setProperty('--mouse-y', y + '%');
            });
            M.AutoInit();

            {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    M.toast({html: '{{message}}'})
                {% endfor %}
            {% endif %}
            {% endwith %}
        </script>

        {% block scripts %}{% endblock %}
    </body>
</html>
